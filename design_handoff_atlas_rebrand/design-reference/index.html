<meta charset="utf-8" />

<title>TaskManager — Rebranding Proposal</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Geist:wght@300;400;500;600;700;800;900&family=Geist+Mono:wght@400;500;600&family=Instrument+Serif:ital@0;1&display=swap" rel="stylesheet">

<style>
  :root {
    /* Brand "Atlas" — final direction */
    --bg-cream: #f5f3ee;
    --bg-cream-2: #efece4;
    --bg-cream-3: #e8e4d8;
    --ink: #1a1a1a;
    --ink-soft: #2a2724;
    --ink-mute: #6b6660;
    --ink-faint: #a8a299;
    --ink-line: #d8d2c4;
    --ink-line-soft: #e6e1d3;
    --terra: #d97757;
    --terra-soft: #f4d9c8;
    --terra-deep: #b35a3d;
    --moss: #5d7256;
    --moss-soft: #d8e0d2;
    --plum: #6b4a5c;
    --gold: #c79e3d;
    --paper: #ffffff;
  }

  *, *::before, *::after { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; }
  body {
    font-family: 'Geist', ui-sans-serif, system-ui, sans-serif;
    background: #f0eee9;
    color: var(--ink);
    -webkit-font-smoothing: antialiased;
    font-feature-settings: "ss01", "cv11";
  }

  .mono { font-family: 'Geist Mono', ui-monospace, monospace; }
  .serif { font-family: 'Instrument Serif', Georgia, serif; }

  /* Shared classes used by every artboard */
  .ab { background: var(--bg-cream); color: var(--ink); font-family: 'Geist', sans-serif; width: 100%; height: 100%; overflow: hidden; position: relative; }
  .ab-paper { background: var(--paper); color: var(--ink); }
  .ab-dark { background: #161514; color: #f0eadf; }

  .tnum { font-variant-numeric: tabular-nums; }
  .tight { letter-spacing: -0.02em; }
  .tighter { letter-spacing: -0.04em; }
  .tightest { letter-spacing: -0.055em; }

  /* hide scrollbars inside artboards */
  .ab *::-webkit-scrollbar { display: none; }
  .ab * { scrollbar-width: none; }

  /* Pencil/marker placeholder for imagery */
  .placeholder {
    background-image: repeating-linear-gradient(135deg, rgba(0,0,0,0.04) 0 1px, transparent 1px 7px);
    border: 1px dashed rgba(0,0,0,0.2);
    display: flex; align-items: center; justify-content: center;
    color: rgba(0,0,0,0.45);
    font-family: 'Geist Mono', monospace; font-size: 11px;
    text-transform: uppercase; letter-spacing: 0.08em;
  }
</style>
</head>
<body>

<div id="root"></div>
